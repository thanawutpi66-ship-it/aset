name: GUI test suite (pytest)

# Runs the aset_batt/ (lab GUI) test suite on every push/PR touching main.
# Separate from main_aset-batt-dashboard.yml, which only builds/deploys
# cloud_dashboard/ — until this workflow existed, nothing enforced that the
# 200+ tests under tests/ actually pass before landing on main; it depended
# entirely on whoever pushed remembering to run pytest locally first.
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'cloud_dashboard/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'cloud_dashboard/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # PySide6/Qt6 needs these system libs even for QT_QPA_PLATFORM=offscreen
      # (no real display) — Qt dynamically links them unconditionally on Linux.
      # Best-effort list based on common PySide6-on-Ubuntu-CI setups; if a
      # future Qt/PySide6 version needs something else, the "Headless GUI
      # smoke test" step below will fail with a clear missing-library error.
      - name: Install Qt runtime dependencies (for headless PySide6)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libopengl0 libxkbcommon0 libxkbcommon-x11-0 \
            libdbus-1-3 libfontconfig1 libfreetype6 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ -q

      - name: Headless GUI smoke test
        # Catches errors in UI-construction code that a unit test wouldn't
        # reach (e.g. a bad widget call in a zone builder) — see CLAUDE.md
        # "เช็คก่อน push".
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -c "
          from aset_batt.ui import theme; theme.set_theme('light')
          from PySide6.QtWidgets import QApplication
          from aset_batt.core.config import ConfigManager
          from aset_batt.ui.isa101_views import BatteryQtWindow
          app = QApplication([])
          w = BatteryQtWindow(ConfigManager())
          w.close()
          print('OK')
          "

      - name: Dead-code scan (vulture)
        # Non-blocking — vulture has real false positives (Qt overrides,
        # getattr-accessed dataclass fields, see CLAUDE.md) so this reports
        # but does not fail the build; a human still verifies before deleting.
        run: |
          pip install vulture
          python -m vulture aset_batt/ tests/ scripts/ --min-confidence 80 || true
